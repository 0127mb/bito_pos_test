services:
  mangoDB:
    image: mongo:7
    container_name: bto_test
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - "mangoDB_data:/data/db"
    healthcheck:
      test: >
        mongosh --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]}).ok }"
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mangoDB_data:
